<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="InboxSweep — free up Gmail storage. Find what's eating space, bulk-delete safely, and unsubscribe in one click."
    />
    <title>InboxSweep — Clean up your Gmail storage</title>
    <!-- Set the theme before paint to avoid a flash of the wrong color scheme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("inboxsweep-theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          if (stored === "dark" || (!stored && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
